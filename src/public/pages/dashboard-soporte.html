<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Soporte — PQRS La Tiburona</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/alerts.css">
  <link rel="stylesheet" href="/css/perfil.css">
  <link rel="stylesheet" href="/css/icons.css">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    /* ── MIS VALORACIONES ── */
    .val-hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 60%, #064e3b 100%);
      border-radius: 18px; padding: 28px 28px 24px;
      display: flex; align-items: center; gap: 28px;
      margin-bottom: 24px; position: relative; overflow: hidden;
      animation: fadeSlideUp 0.45s ease both;
    }
    .val-hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(52,211,153,0.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .val-score-ring {
      flex-shrink: 0; width: 96px; height: 96px; position: relative;
    }
    .val-score-ring svg { width: 96px; height: 96px; transform: rotate(-90deg); }
    .val-score-ring .ring-track { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 7; }
    .val-score-ring .ring-fill {
      fill: none; stroke: #34d399; stroke-width: 7;
      stroke-linecap: round;
      stroke-dasharray: 251.2;
      stroke-dashoffset: 251.2;
      transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
    }
    .val-score-ring .ring-fill.amarillo { stroke: #fbbf24; }
    .val-score-ring .ring-fill.rojo     { stroke: #f87171; }
    .val-score-num {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; font-weight: 800;
    }
    .val-score-num .num { font-size: 1.7rem; line-height: 1; letter-spacing: -0.03em; }
    .val-score-num .de5 { font-size: 0.65rem; color: rgba(255,255,255,0.5); margin-top: 2px; }
    .val-hero-info { flex: 1; }
    .val-hero-info h2 { color: #fff; font-size: 1.2rem; font-weight: 800; margin: 0 0 6px; }
    .val-hero-info p  { color: rgba(255,255,255,0.55); font-size: 0.82rem; margin: 0 0 14px; }
    .val-stars-display { display: flex; gap: 5px; }
    .val-stars-display svg { width: 20px; height: 20px; }
    .val-stars-display .estrella-llena  { color: #fbbf24; fill: #fbbf24; }
    .val-stars-display .estrella-media  { color: #fbbf24; fill: none; }
    .val-stars-display .estrella-vacia  { color: rgba(255,255,255,0.2); fill: none; }
    .val-mini-stats {
      display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px;
    }
    .val-mini-stat {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 8px 14px; text-align: center;
      transition: background 0.2s;
    }
    .val-mini-stat:hover { background: rgba(255,255,255,0.13); }
    .val-mini-stat .vsn { font-size: 1.2rem; font-weight: 800; color: #34d399; display: block; }
    .val-mini-stat .vsl { font-size: 0.67rem; color: rgba(255,255,255,0.45); display: block; margin-top: 1px; }

    /* Barra de distribución */
    .val-dist-card {
      background: #fff; border-radius: 14px; padding: 20px 22px;
      border: 1px solid #e2e8f0; margin-bottom: 22px;
      animation: fadeSlideUp 0.5s ease 0.1s both;
    }
    .val-dist-card h3 {
      font-size: 0.88rem; font-weight: 700; color: #0f172a;
      margin: 0 0 16px; display: flex; align-items: center; gap: 8px;
    }
    .val-dist-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
    }
    .val-dist-label {
      display: flex; align-items: center; gap: 4px;
      width: 68px; flex-shrink: 0; font-size: 0.78rem; color: #475569; font-weight: 600;
    }
    .val-dist-label svg { width: 12px; height: 12px; flex-shrink: 0; }
    .val-dist-bar-wrap {
      flex: 1; height: 10px; background: #f1f5f9; border-radius: 99px; overflow: hidden;
    }
    .val-dist-bar {
      height: 100%; border-radius: 99px;
      width: 0; transition: width 1s cubic-bezier(.4,0,.2,1);
    }
    .vdb-5 { background: linear-gradient(90deg, #34d399, #059669); }
    .vdb-4 { background: linear-gradient(90deg, #6ee7b7, #34d399); }
    .vdb-3 { background: linear-gradient(90deg, #fcd34d, #fbbf24); }
    .vdb-2 { background: linear-gradient(90deg, #fca5a5, #f87171); }
    .vdb-1 { background: linear-gradient(90deg, #f87171, #ef4444); }
    .val-dist-count {
      width: 28px; text-align: right; font-size: 0.78rem;
      font-weight: 700; color: #64748b; flex-shrink: 0;
    }

    /* Lista de valoraciones */
    .val-lista { display: flex; flex-direction: column; gap: 12px; }
    .val-item {
      background: #fff; border-radius: 14px; padding: 16px 18px;
      border: 1px solid #e2e8f0; border-left: 4px solid #e2e8f0;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      animation: fadeSlideUp 0.4s ease both;
    }
    .val-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(15,23,42,0.09);
    }
    .val-item.est-5 { border-left-color: #34d399; }
    .val-item.est-4 { border-left-color: #6ee7b7; }
    .val-item.est-3 { border-left-color: #fbbf24; }
    .val-item.est-2 { border-left-color: #f87171; }
    .val-item.est-1 { border-left-color: #ef4444; }
    .val-item-top {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
      margin-bottom: 10px;
    }
    .val-item-usuario {
      display: flex; align-items: center; gap: 10px;
    }
    .val-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #1e3a8a, #064e3b);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 0.82rem; flex-shrink: 0;
    }
    .val-usuario-info strong { font-size: 0.88rem; color: #0f172a; display: block; line-height: 1.2; }
    .val-usuario-info span  { font-size: 0.72rem; color: #94a3b8; }
    .val-estrellas-item { display: flex; gap: 3px; flex-shrink: 0; }
    .val-estrellas-item svg { width: 15px; height: 15px; }
    .val-star-llena { fill: #fbbf24; color: #fbbf24; }
    .val-star-vacia { fill: none; color: #e2e8f0; }
    .val-pqrs-info {
      font-size: 0.78rem; color: #475569;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;
    }
    .val-pqrs-info code {
      background: #f1f5f9; padding: 2px 7px; border-radius: 5px;
      font-size: 0.72rem; color: #475569; font-weight: 700;
    }
    .val-comentario {
      font-size: 0.83rem; color: #334155; line-height: 1.55;
      background: #f8fafc; border-radius: 9px; padding: 10px 13px;
      border-left: 3px solid #e2e8f0; font-style: italic;
      margin-top: 8px;
    }
    .val-comentario.est-5 { border-left-color: #34d399; background: #f0fdf4; }
    .val-comentario.est-4 { border-left-color: #6ee7b7; background: #f0fdf9; }
    .val-comentario.est-3 { border-left-color: #fcd34d; background: #fffbeb; }
    .val-comentario.est-2, .val-comentario.est-1 { border-left-color: #f87171; background: #fff5f5; }
    .val-vacio {
      text-align: center; padding: 52px 24px;
      background: #fff; border-radius: 16px; border: 1px dashed #e2e8f0;
      color: #94a3b8; font-size: 0.9rem; animation: fadeSlideUp 0.4s ease both;
    }
    .val-vacio svg { width: 48px; height: 48px; opacity: 0.3; display: block; margin: 0 auto 12px; }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 768px) {
      .val-hero { flex-direction: column; text-align: center; gap: 18px; }
      .val-mini-stats { justify-content: center; }
      .val-stars-display { justify-content: center; }
    }

        position: fixed !important;
        bottom: 0 !important; left: 0 !important; right: 0 !important;
        z-index: 9999 !important;
        background: #0f172a !important;
        border-top: 1px solid rgba(255,255,255,0.12) !important;
        min-height: 60px !important;
        align-items: stretch !important;
        padding-bottom: env(safe-area-inset-bottom, 8px) !important;
        box-shadow: 0 -4px 24px rgba(0,0,0,0.5) !important;
      }
      #nav-bottom .nav-item {
        flex: 1 !important; flex-direction: column !important;
        align-items: center !important; justify-content: center !important;
        gap: 3px !important; padding: 8px 4px !important;
        background: none !important; border: none !important;
        color: rgba(255,255,255,0.45) !important; cursor: pointer !important;
        font-family: inherit !important; font-size: 0.6rem !important;

      #nav-bottom .nav-item.activo { color: #34d399 !important; background: rgba(52,211,153,0.1) !important; }

    }
  </style>
</head>
<body style="background:var(--gris-claro);">

<!-- Alertas flotantes -->
<div id="alertas-container" class="alerta-flotante"></div>

<div class="dash-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="/img/logo-tiburona.png" alt="La Tiburona" style="width:38px;height:38px;object-fit:contain;border-radius:50%;background:#fff;padding:3px;">
      <div>
        <h2 style="font-size:0.92rem;margin:0;">La Tiburona</h2>
        <small>Panel Soporte</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item activo" onclick="mostrarSeccionSoporte('asignadas', this)">
        <span class="ni"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></span> Mis asignaciones
        <span class="notif-badge" id="badge-pendientes">0</span>
      </button>
      <button class="nav-item" onclick="mostrarSeccionSoporte('resueltas', this)">
        <span class="ni"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span> Resueltas
      </button>
      <button class="nav-item" onclick="mostrarSeccionSoporte('valoraciones', this)">
        <span class="ni"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span> Mis valoraciones
      </button>
      <button class="nav-item" onclick="mostrarSeccionSoporte('perfil', this)">
        <span class="ni"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span> Mi cuenta
      </button>
    </nav>
    <div class="sidebar-user">
      <strong id="nombre-soporte">Soporte</strong>
      <span class="badge badge-soporte" style="margin:4px 0;display:inline-block;">Soporte</span>
      <div id="notif-sidebar-container"></div>
      <button onclick="cerrarSesionLocal()" class="btn btn-sm btn-peligro" style="margin-top:10px;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;">
        <span style="display:flex;align-items:center;flex-shrink:0;width:14px;height:14px;"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <main class="main-content">

    <!-- Stats -->
    <div class="stats-grid" style="margin-bottom:24px;">
      <div class="stat-card naranja"><div class="numero" id="s-activas">0</div><div class="etiqueta">Activas</div></div>
      <div class="stat-card rojo"><div class="numero" id="s-urgentes">0</div><div class="etiqueta">Urgentes</div></div>
      <div class="stat-card verde"><div class="numero" id="s-resueltas">0</div><div class="etiqueta">Resueltas hoy</div></div>
    </div>

    <!-- ASIGNADAS -->
    <section id="sec-asignadas">
      <div class="page-header"><h1>Mis asignaciones activas</h1></div>
      <div id="lista-asignadas"></div>
    </section>

    <!-- RESUELTAS -->
    <section id="sec-resueltas" style="display:none;">
      <div class="page-header"><h1>PQRS resueltas</h1></div>
      <div class="tabla-wrap">
        <table>
          <thead>
            <tr><th>Radicado</th><th>Tipo</th><th>Asunto</th><th>Resuelto</th></tr>
          </thead>
          <tbody id="tabla-resueltas">
            <tr><td colspan="4" style="text-align:center;color:#aaa;">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- VALORACIONES -->
    <section id="sec-valoraciones" style="display:none;">
      <div class="page-header"><h1>Mis valoraciones</h1></div>
      <div id="val-contenido"></div>
    </section>

    <!-- PERFIL -->
    <section id="sec-perfil" style="display:none;"></section>

  </main>

  <!-- NAV INFERIOR MÓVIL -->
  <nav class="nav-bottom-mobile" id="nav-bottom">
    <button class="nav-item activo" onclick="mostrarSeccionSoporte('asignadas', this)" data-seccion="asignadas">
      <span class="ni ni-mob"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></span>
      <span class="notif-badge" id="badge-pendientes-nav" style="display:none;">0</span>
      <span class="nav-label">Asignadas</span>
    </button>
    <button class="nav-item" onclick="mostrarSeccionSoporte('resueltas', this)" data-seccion="resueltas">
      <span class="ni ni-mob"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>
      <span class="nav-label">Resueltas</span>
    </button>
    <button class="nav-item" onclick="mostrarSeccionSoporte('valoraciones', this)" data-seccion="valoraciones">
      <span class="ni ni-mob"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
      <span class="nav-label">Valoraciones</span>
    </button>
    <button class="nav-item" onclick="mostrarSeccionSoporte('perfil', this)" data-seccion="perfil">
      <span class="ni ni-mob"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
      <span class="nav-label">Cuenta</span>
    </button>
  </nav>
</div>

<!-- MODAL RESPONDER -->
<div class="modal-overlay" id="modal-responder">
  <div class="modal">
    <div class="modal-header">
      <h2>Responder PQRS</h2>
      <button class="btn-cerrar" onclick="cerrarModal('modal-responder')">×</button>
    </div>
    <div id="msg-responder" class="mensaje"></div>
    <div id="detalle-pqrs-soporte" style="background:var(--gris-claro);border-radius:8px;padding:14px;margin-bottom:16px;font-size:0.85rem;"></div>
    <div class="form-grupo">
      <label>Respuesta / Acción tomada</label>
      <textarea id="respuesta-texto" rows="5" placeholder="Describe la solución o acción tomada..."></textarea>
    </div>
    <div class="form-grupo">
      <label>Nuevo estado</label>
      <select id="nuevo-estado">
        <option value="en_proceso">En proceso (seguir trabajando)</option>
        <option value="resuelto">Resuelto (cerrar PQRS)</option>
      </select>
    </div>
    <button class="btn btn-verde" onclick="enviarRespuesta()"><span class="ni ni-sm"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg></span> Guardar respuesta</button>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal-detalle-soporte">
  <div class="modal">
    <div class="modal-header">
      <h2>Detalle de PQRS</h2>
      <button class="btn-cerrar" onclick="cerrarModal('modal-detalle-soporte')">×</button>
    </div>
    <div id="detalle-soporte-contenido"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/soporte.js"></script>
<script src="/js/perfil.js"></script>
<script>
(function() {
  document.addEventListener('DOMContentLoaded', () => {
    const navItems = document.querySelectorAll('.nav-bottom-mobile .nav-item');
    navItems.forEach(btn => {
      btn.addEventListener('click', () => {
        navItems.forEach(b => b.classList.remove('activo'));
        btn.classList.add('activo');
      });
    });
    document.querySelectorAll('.sidebar-nav .nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        const onclick = btn.getAttribute('onclick') || '';
        const match = onclick.match(/['"]([a-z-]+)['"]/);
        if (match) {
          navItems.forEach(b => b.classList.toggle('activo', b.dataset.seccion === match[1]));
        }
      });
    });
    // Sincronizar badge de pendientes en nav inferior
    const badgeSidebar = document.getElementById('badge-pendientes');
    const badgeNav = document.getElementById('badge-pendientes-nav');
    if (badgeSidebar && badgeNav) {
      const observer = new MutationObserver(() => {
        const val = badgeSidebar.textContent.trim();
        badgeNav.textContent = val;
        badgeNav.style.display = (val && val !== '0') ? '' : 'none';
      });
      observer.observe(badgeSidebar, { childList: true, subtree: true, characterData: true });
    }
  });
})();
</script>
</body>
</html>
