<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Soporte — PQRS La Tiburona</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/alerts.css">
  <link rel="stylesheet" href="/css/perfil.css">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    @media (max-width: 768px) {
      #nav-bottom {
        display: flex !important;
        position: fixed !important;
        bottom: 0 !important; left: 0 !important; right: 0 !important;
        z-index: 9999 !important;
        background: #0f172a !important;
        border-top: 1px solid rgba(255,255,255,0.12) !important;
        min-height: 60px !important;
        align-items: stretch !important;
        padding-bottom: env(safe-area-inset-bottom, 8px) !important;
        box-shadow: 0 -4px 24px rgba(0,0,0,0.5) !important;
      }
      #nav-bottom .nav-item {
        flex: 1 !important; flex-direction: column !important;
        align-items: center !important; justify-content: center !important;
        gap: 3px !important; padding: 8px 4px !important;
        background: none !important; border: none !important;
        color: rgba(255,255,255,0.45) !important; cursor: pointer !important;
        font-family: inherit !important; font-size: 0.6rem !important;
        font-weight: 600 !important; min-height: 56px !important;
        border-radius: 0 !important; position: relative !important;
      }
      #nav-bottom .nav-item.activo { color: #34d399 !important; background: rgba(52,211,153,0.1) !important; }
      #nav-bottom .nav-item .nav-emoji { font-size: 1.3rem !important; line-height: 1 !important; display: block !important; }
      #nav-bottom .nav-item .nav-label { font-size: 0.6rem !important; display: block !important; text-align: center !important; }
      .main-content { padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px)) !important; }
    }
  </style>
</head>
<body style="background:var(--gris-claro);">

<!-- Alertas flotantes -->
<div id="alertas-container" class="alerta-flotante"></div>

<div class="dash-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="/img/logo-tiburona.png" alt="La Tiburona" style="width:38px;height:38px;object-fit:contain;border-radius:50%;background:#fff;padding:3px;">
      <div>
        <h2 style="font-size:0.92rem;margin:0;">La Tiburona</h2>
        <small>Panel Soporte</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item activo" onclick="mostrarSeccionSoporte('asignadas', this)">
        📋 Mis asignaciones
        <span class="notif-badge" id="badge-pendientes">0</span>
      </button>
      <button class="nav-item" onclick="mostrarSeccionSoporte('resueltas', this)">
        ✅ Resueltas
      </button>
      <button class="nav-item" onclick="mostrarSeccionSoporte('perfil', this)">
        ⚙️ Mi cuenta
      </button>
    </nav>
    <div class="sidebar-user">
      <strong id="nombre-soporte">Soporte</strong>
      <span class="badge badge-soporte" style="margin:4px 0;display:inline-block;">Soporte</span>
      <div id="notif-sidebar-container"></div>
      <button onclick="cerrarSesionLocal()" class="btn btn-sm btn-peligro" style="margin-top:8px;width:100%;">
        🚪 Salir
      </button>
    </div>
  </aside>

  <main class="main-content">

    <!-- Stats -->
    <div class="stats-grid" style="margin-bottom:24px;">
      <div class="stat-card naranja"><div class="numero" id="s-activas">0</div><div class="etiqueta">Activas</div></div>
      <div class="stat-card rojo"><div class="numero" id="s-urgentes">0</div><div class="etiqueta">Urgentes</div></div>
      <div class="stat-card verde"><div class="numero" id="s-resueltas">0</div><div class="etiqueta">Resueltas hoy</div></div>
    </div>

    <!-- ASIGNADAS -->
    <section id="sec-asignadas">
      <div class="page-header"><h1>📋 Mis asignaciones activas</h1></div>
      <div id="lista-asignadas"></div>
    </section>

    <!-- RESUELTAS -->
    <section id="sec-resueltas" style="display:none;">
      <div class="page-header"><h1>✅ PQRS resueltas</h1></div>
      <div class="tabla-wrap">
        <table>
          <thead>
            <tr><th>Radicado</th><th>Tipo</th><th>Asunto</th><th>Resuelto</th></tr>
          </thead>
          <tbody id="tabla-resueltas">
            <tr><td colspan="4" style="text-align:center;color:#aaa;">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- PERFIL -->
    <section id="sec-perfil" style="display:none;"></section>

  </main>

  <!-- NAV INFERIOR MÓVIL -->
  <nav class="nav-bottom-mobile" id="nav-bottom">
    <button class="nav-item activo" onclick="mostrarSeccionSoporte('asignadas', this)" data-seccion="asignadas">
      <span class="nav-emoji">📋</span>
      <span class="notif-badge" id="badge-pendientes-nav" style="display:none;">0</span>
      <span class="nav-label">Asignadas</span>
    </button>
    <button class="nav-item" onclick="mostrarSeccionSoporte('resueltas', this)" data-seccion="resueltas">
      <span class="nav-emoji">✅</span>
      <span class="nav-label">Resueltas</span>
    </button>
    <button class="nav-item" onclick="mostrarSeccionSoporte('perfil', this)" data-seccion="perfil">
      <span class="nav-emoji">⚙️</span>
      <span class="nav-label">Cuenta</span>
    </button>
  </nav>
</div>

<!-- MODAL RESPONDER -->
<div class="modal-overlay" id="modal-responder">
  <div class="modal">
    <div class="modal-header">
      <h2>Responder PQRS</h2>
      <button class="btn-cerrar" onclick="cerrarModal('modal-responder')">×</button>
    </div>
    <div id="msg-responder" class="mensaje"></div>
    <div id="detalle-pqrs-soporte" style="background:var(--gris-claro);border-radius:8px;padding:14px;margin-bottom:16px;font-size:0.85rem;"></div>
    <div class="form-grupo">
      <label>Respuesta / Acción tomada</label>
      <textarea id="respuesta-texto" rows="5" placeholder="Describe la solución o acción tomada..."></textarea>
    </div>
    <div class="form-grupo">
      <label>Nuevo estado</label>
      <select id="nuevo-estado">
        <option value="en_proceso">En proceso (seguir trabajando)</option>
        <option value="resuelto">Resuelto (cerrar PQRS)</option>
      </select>
    </div>
    <button class="btn btn-verde" onclick="enviarRespuesta()">✅ Guardar respuesta</button>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal-detalle-soporte">
  <div class="modal">
    <div class="modal-header">
      <h2>Detalle de PQRS</h2>
      <button class="btn-cerrar" onclick="cerrarModal('modal-detalle-soporte')">×</button>
    </div>
    <div id="detalle-soporte-contenido"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/soporte.js"></script>
<script src="/js/perfil.js"></script>
<script>
(function() {
  document.addEventListener('DOMContentLoaded', () => {
    const navItems = document.querySelectorAll('.nav-bottom-mobile .nav-item');
    navItems.forEach(btn => {
      btn.addEventListener('click', () => {
        navItems.forEach(b => b.classList.remove('activo'));
        btn.classList.add('activo');
      });
    });
    document.querySelectorAll('.sidebar-nav .nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        const onclick = btn.getAttribute('onclick') || '';
        const match = onclick.match(/['"]([a-z-]+)['"]/);
        if (match) {
          navItems.forEach(b => b.classList.toggle('activo', b.dataset.seccion === match[1]));
        }
      });
    });
    // Sincronizar badge de pendientes en nav inferior
    const badgeSidebar = document.getElementById('badge-pendientes');
    const badgeNav = document.getElementById('badge-pendientes-nav');
    if (badgeSidebar && badgeNav) {
      const observer = new MutationObserver(() => {
        const val = badgeSidebar.textContent.trim();
        badgeNav.textContent = val;
        badgeNav.style.display = (val && val !== '0') ? '' : 'none';
      });
      observer.observe(badgeSidebar, { childList: true, subtree: true, characterData: true });
    }
  });
})();
</script>
</body>
</html>
